name: Update Portfolio PDF

on:
  push:
    branches:
      - main
    paths:
      - '_projects/**'
      - '_pages/projects.md'
      - '_data/bib_meta.yml'
      - '_config.yml'
      - '_scripts/portfolio_to_pdf.py'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-cjk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          cd _scripts
          npm install puppeteer
          cd ..

      - name: Generate Portfolio PDF
        run: |
          python3 _scripts/portfolio_to_pdf.py
        continue-on-error: false

      - name: Check if PDF changed
        id: check_changes
        run: |
          if git diff --quiet assets/pdf/Portfolio.pdf; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated PDF
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/pdf/Portfolio.pdf
          git commit -m "Auto-update Portfolio PDF from projects changes"
          git push

      - name: Notify if no changes
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "Portfolio PDF is up to date, no changes needed"
